<!doctype html>
<html lang="sk">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#0e0e10" />
        <meta name="description" content="Prehrávač videa" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
        <title>videjoo</title>
        <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);</script>
        <style>
            html, body { background: #0e0e10; color: #f4f4f5; margin: 0; }
            #emergent-badge, a[href*="emergent.sh"] { display: none !important; visibility: hidden !important; pointer-events: none !important; }
        </style>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
        <script>
            (function () {
                function removeEmergent() {
                    var badge = document.getElementById("emergent-badge");
                    if (badge) badge.remove();
                    document.querySelectorAll('a[href*="emergent.sh"]').forEach(function (el) { el.remove(); });
                }
                removeEmergent();
                new MutationObserver(removeEmergent).observe(document.documentElement, { childList: true, subtree: true });
            })();
        </script>
    </body>
</html>
